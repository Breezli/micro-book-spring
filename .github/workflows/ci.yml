name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io/${{ lower(github.repository_owner) }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload auth-service jar
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-jar
          path: auth-service/target/*.jar

      - name: Upload book-service jar
        uses: actions/upload-artifact@v4
        with:
          name: book-service-jar
          path: book-service/target/*.jar

      - name: Upload gateway jar
        uses: actions/upload-artifact@v4
        with:
          name: gateway-jar
          path: gateway/target/*.jar

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  docker:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download backend jars
        uses: actions/download-artifact@v4
        with:
          name: auth-service-jar
          path: auth-service/target/

      - name: Download book-service jar
        uses: actions/download-artifact@v4
        with:
          name: book-service-jar
          path: book-service/target/

      - name: Download gateway jar
        uses: actions/download-artifact@v4
        with:
          name: gateway-jar
          path: gateway/target/

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push auth-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: auth-service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/micro-book-auth:${{ env.IMAGE_TAG }},${{ env.REGISTRY }}/micro-book-auth:latest

      - name: Build & push book-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: book-service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/micro-book-book:${{ env.IMAGE_TAG }},${{ env.REGISTRY }}/micro-book-book:latest

      - name: Build & push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: gateway/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/micro-book-gateway:${{ env.IMAGE_TAG }},${{ env.REGISTRY }}/micro-book-gateway:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/micro-book-frontend:${{ env.IMAGE_TAG }},${{ env.REGISTRY }}/micro-book-frontend:latest
