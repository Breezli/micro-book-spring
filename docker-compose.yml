services:
  consul:
    image: consul:1.15
    container_name: micro-book-consul
    ports:
      - "8500:8500"
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0 -bind=0.0.0.0
    networks:
      - micro-book-net

  redis:
    image: redis:7-alpine
    container_name: micro-book-redis
    expose:
      - "6379"
    networks:
      - micro-book-net

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: micro-book-auth
    expose:
      - "8081"
    environment:
      - SPRING_CLOUD_CONSUL_HOST=consul
    depends_on:
      - consul
    networks:
      - micro-book-net

  book-service:
    build:
      context: .
      dockerfile: book-service/Dockerfile
    container_name: micro-book-book
    expose:
      - "8082"
    environment:
      - SPRING_CLOUD_CONSUL_HOST=consul
      - REDIS_HOST=redis
    depends_on:
      - consul
      - auth-service
      - redis
    networks:
      - micro-book-net

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: micro-book-gateway
    ports:
      - "8088:8080"
    environment:
      - SPRING_CLOUD_CONSUL_HOST=consul
    depends_on:
      - consul
      - auth-service
      - book-service
    networks:
      - micro-book-net

  frontend:
    build:
      context: ./frontend
    container_name: micro-book-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway
    networks:
      - micro-book-net

networks:
  micro-book-net:
    driver: bridge
