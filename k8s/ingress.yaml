apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: micro-book-ingress
  namespace: micro-book
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    - host: micro-book.local
      http:
        paths:
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: gateway
                port:
                  number: 8080
