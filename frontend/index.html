<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="max-w-4xl mx-auto px-4 py-8">
        <!-- ====== 登录页 ====== -->
        <div id="loginPage" class="max-w-sm mx-auto mt-20">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
                <h1 class="text-2xl font-bold text-center mb-2">图书管理系统</h1>
                <p class="text-sm text-gray-500 text-center mb-6">SpringBoot 微服务版</p>
                <div class="space-y-4">
                    <div>
                        <input id="loginUser" type="text" placeholder="用户名"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <input id="loginPass" type="password" placeholder="密码"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div id="loginError" class="text-sm text-red-500 hidden bg-red-50 px-3 py-2 rounded-lg"></div>
                    <button onclick="login()"
                        class="w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">
                        登录
                    </button>
                    <p class="text-xs text-gray-400 text-center mt-4">
                        测试账号：admin / admin123
                        <br>没有账号？<a href="#" onclick="showRegister()" class="text-blue-600 hover:underline">注册</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- ====== 注册页 ====== -->
        <div id="registerPage" class="max-w-sm mx-auto mt-20 hidden">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
                <h1 class="text-2xl font-bold text-center mb-6">注册账号</h1>
                <div class="space-y-4">
                    <div>
                        <input id="regUser" type="text" placeholder="用户名"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <input id="regPass" type="password" placeholder="密码"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div id="regError" class="text-sm text-red-500 hidden bg-red-50 px-3 py-2 rounded-lg"></div>
                    <button onclick="register()"
                        class="w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">
                        注册
                    </button>
                    <p class="text-xs text-gray-400 text-center mt-4">
                        已有账号？<a href="#" onclick="showLogin()" class="text-blue-600 hover:underline">登录</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- ====== 主界面 ====== -->
        <div id="mainPage" class="hidden">
            <!-- 导航栏 -->
            <nav class="bg-white rounded-xl shadow-sm border border-gray-200 px-6 py-3 mb-6 flex items-center justify-between">
                <h2 class="text-lg font-bold text-blue-600">📚 图书管理系统</h2>
                <div class="flex items-center gap-4">
                    <span id="userDisplay" class="text-sm text-gray-500"></span>
                    <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700">退出</button>
                </div>
            </nav>

            <!-- 统计卡片 -->
            <div class="grid grid-cols-3 gap-4 mb-6" id="statsRow">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 text-center">
                    <div class="text-xs text-gray-500">图书总数</div>
                    <div id="statBooks" class="text-2xl font-bold text-blue-600">-</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 text-center">
                    <div class="text-xs text-gray-500">微服务</div>
                    <div class="text-2xl font-bold text-green-600">3</div>
                    <div class="text-[10px] text-gray-400">Auth / Book / Gateway</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 text-center">
                    <div class="text-xs text-gray-500">API 端口</div>
                    <div class="text-2xl font-bold text-purple-600">8080</div>
                    <div class="text-[10px] text-gray-400">Gateway 入口</div>
                </div>
            </div>

            <!-- 工具栏 -->
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold">图书列表</h3>
                <button onclick="showAddForm()"
                    class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">
                    + 添加图书
                </button>
            </div>

            <!-- 添加图书表单 -->
            <div id="addForm" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
                <h4 class="font-medium mb-4">添加图书</h4>
                <div class="grid grid-cols-2 gap-4">
                    <input id="bookTitle" placeholder="书名" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    <input id="bookAuthor" placeholder="作者" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    <input id="bookIsbn" placeholder="ISBN" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    <input id="bookPrice" type="number" step="0.01" placeholder="价格"
                        class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <textarea id="bookDesc" placeholder="描述" rows="2"
                    class="w-full mt-4 px-3 py-2 border border-gray-300 rounded-lg text-sm"></textarea>
                <div id="formError" class="text-sm text-red-500 hidden mt-2"></div>
                <div class="flex gap-2 mt-4">
                    <button onclick="addBook()"
                        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">保存</button>
                    <button onclick="hideAddForm()"
                        class="px-6 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 text-sm">取消</button>
                </div>
            </div>

            <!-- 图书列表 -->
            <div id="bookList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8080';
        let token = localStorage.getItem('token');

        // ====== 页面切换 ======
        function showLogin() {
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('registerPage').classList.add('hidden');
        }
        function showRegister() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('registerPage').classList.remove('hidden');
        }

        // ====== 登录 ======
        async function login() {
            const username = document.getElementById('loginUser').value;
            const password = document.getElementById('loginPass').value;
            const errEl = document.getElementById('loginError');

            try {
                const res = await fetch(API + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) { errEl.textContent = data.error || '登录失败'; errEl.classList.remove('hidden'); return; }

                token = data.token;
                localStorage.setItem('token', token);
                errEl.classList.add('hidden');
                enterMain(data.username || username);
            } catch (e) {
                errEl.textContent = '无法连接后端，确认服务已启动';
                errEl.classList.remove('hidden');
            }
        }

        // ====== 注册 ======
        async function register() {
            const username = document.getElementById('regUser').value;
            const password = document.getElementById('regPass').value;
            const errEl = document.getElementById('regError');

            try {
                const res = await fetch(API + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) { errEl.textContent = data.error || '注册失败'; errEl.classList.remove('hidden'); return; }

                token = data.token;
                localStorage.setItem('token', token);
                errEl.classList.add('hidden');
                enterMain(data.username || username);
            } catch (e) {
                errEl.textContent = '无法连接后端';
                errEl.classList.remove('hidden');
            }
        }

        // ====== 进入主界面 ======
        function enterMain(username) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('registerPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('userDisplay').textContent = '你好, ' + username;
            loadBooks();
        }

        // ====== 退出 ======
        function logout() {
            token = null;
            localStorage.removeItem('token');
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
        }

        // ====== 加载图书 ======
        async function loadBooks() {
            try {
                const res = await fetch(API + '/books', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.status === 401) { logout(); return; }
                const data = await res.json();
                const books = data.books || [];

                document.getElementById('statBooks').textContent = books.length;
                renderBooks(books);
            } catch (e) {
                document.getElementById('bookList').innerHTML =
                    '<div class="col-span-2 text-center py-12 text-gray-400">无法加载图书列表</div>';
            }
        }

        // ====== 渲染图书卡片 ======
        function renderBooks(books) {
            const container = document.getElementById('bookList');
            if (books.length === 0) {
                container.innerHTML = '<div class="col-span-2 text-center py-12 text-gray-400">暂无图书，点击上方按钮添加</div>';
                return;
            }
            container.innerHTML = books.map(b => `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 hover:shadow-md transition-shadow">
                    <h4 class="font-semibold text-lg mb-2">${b.title}</h4>
                    <p class="text-sm text-gray-500">作者：${b.author}</p>
                    <p class="text-sm text-gray-500">ISBN：${b.isbn || '-'}</p>
                    <p class="text-sm text-gray-500 mb-2">价格：¥${b.price ? Number(b.price).toFixed(2) : '0.00'}</p>
                    <p class="text-sm text-gray-600 mb-4">${b.description || ''}</p>
                    <button onclick="deleteBook(${b.id})"
                        class="text-sm text-red-500 hover:text-red-700">删除</button>
                </div>
            `).join('');
        }

        // ====== 添加图书 ======
        function showAddForm() {
            document.getElementById('addForm').classList.remove('hidden');
            document.getElementById('formError').classList.add('hidden');
        }
        function hideAddForm() {
            document.getElementById('addForm').classList.add('hidden');
            ['bookTitle', 'bookAuthor', 'bookIsbn', 'bookPrice', 'bookDesc'].forEach(id => document.getElementById(id).value = '');
        }

        async function addBook() {
            const title = document.getElementById('bookTitle').value;
            const author = document.getElementById('bookAuthor').value;
            const isbn = document.getElementById('bookIsbn').value;
            const price = parseFloat(document.getElementById('bookPrice').value) || 0;
            const description = document.getElementById('bookDesc').value;
            const errEl = document.getElementById('formError');

            if (!title || !author) {
                errEl.textContent = '书名和作者不能为空'; errEl.classList.remove('hidden'); return;
            }

            try {
                const res = await fetch(API + '/books', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ title, author, isbn, description, price })
                });
                if (!res.ok) { const d = await res.json(); errEl.textContent = d.error || '添加失败'; errEl.classList.remove('hidden'); return; }
                hideAddForm();
                loadBooks();
            } catch (e) {
                errEl.textContent = '请求失败'; errEl.classList.remove('hidden');
            }
        }

        // ====== 删除图书 ======
        async function deleteBook(id) {
            if (!confirm('确定删除？')) return;
            try {
                await fetch(API + '/books/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                loadBooks();
            } catch (e) {}
        }

        // ====== 自动登录（如果 localStorage 有 token）=====
        (async function autoLogin() {
            if (token) {
                try {
                    const res = await fetch(API + '/books', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        enterMain('用户');
                        return;
                    }
                } catch (e) {}
                localStorage.removeItem('token');
            }
        })();
    </script>
</body>
</html>
