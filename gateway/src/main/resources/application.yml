server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        service-name: ${spring.application.name}
        instance-id: ${spring.application.name}:${random.value}
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - name: JwtAuth
              args:
                excludedPaths:
                  - /auth

        - id: book-service
          uri: lb://book-service
          predicates:
            - Path=/books/**
          filters:
            - name: JwtAuth
              args:
                excludedPaths:
                  - /books/public

      default-filters:
        - name: JwtAuth
          args:
            excludedPaths:
              - /auth
              - /actuator

jwt:
  secret: micro-book-secret-key-2024-must-be-at-least-32-chars!!

management:
  endpoints:
    web:
      exposure:
        include: health,info
